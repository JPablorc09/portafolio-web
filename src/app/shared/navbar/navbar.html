<header class="navbar">
  <nav class="navbar__container">
    <a routerLink="/" class="navbar__brand" (click)="closeMenu()">
      <span class="navbar__logo">JP</span>

      <span class="navbar__identity">
        <strong>Juan Pablo Rojas</strong>
        <small>Ingeniero de Sistemas</small>
      </span>
    </a>

    <button
      type="button"
      class="navbar__toggle"
      aria-label="Abrir menú"
      [attr.aria-expanded]="menuOpen()"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar__links" [class.navbar__links--open]="menuOpen()">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        Inicio
      </a>

      <a
        routerLink="/sobre-mi"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        Sobre mí
      </a>
      <a
      routerLink="/formacion"
      routerLinkActive="active"
      (click)="closeMenu()"
    >
     Formación
    </a>
      <a
        routerLink="/experiencia"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        Experiencia
      </a>

      <a
        routerLink="/proyectos"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        Proyectos
      </a>

      <a
        routerLink="/habilidades"
        routerLinkActive="active"
        (click)="closeMenu()"
      >
        Habilidades
      </a>

      <a
        routerLink="/contacto"
        routerLinkActive="active"
        class="navbar__contact"
        (click)="closeMenu()"
      >
        Contacto
      </a>
    </div>
  </nav>
</header>
